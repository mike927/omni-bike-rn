<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike · Training — C · Effort Ring</title>
<link rel="stylesheet" href="calm-noir.css" />
<style>
  .ringwrap { display:flex; flex-direction:column; align-items:center; padding:10px 0 2px; }
  .ring-outer { width:218px; height:218px; border-radius:50%; position:relative; display:grid; place-items:center;
    background:conic-gradient(from 220deg, var(--mint) 0deg, var(--mint-soft) 120deg, var(--amber) 215deg, var(--hairline) 250deg 360deg);
    box-shadow:0 0 50px -12px rgba(16,181,164,.45); }
  .ring-outer::before { content:""; position:absolute; inset:-14px; border-radius:50%;
    background:radial-gradient(circle, rgba(16,181,164,.16), transparent 70%); animation:glowpulse 3s ease-in-out infinite; }
  @keyframes glowpulse { 0%,100%{opacity:.45} 50%{opacity:.9} }
  .ring-inner { width:180px; height:180px; border-radius:50%; background:#0c1017; position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; box-shadow:inset 0 0 0 1px var(--hairline); }
  .ring-zone { font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--amber-soft); }
  .ring-hr { font-size:58px; font-weight:800; letter-spacing:-.05em; color:var(--ink); line-height:.92; font-variant-numeric:tabular-nums; }
  .ring-un { font-size:13px; font-weight:600; color:var(--ink-2); }
  .ring-time { margin-top:18px; text-align:center; }
  .ring-time .t { font-size:32px; font-weight:800; letter-spacing:-.04em; color:var(--ink); font-variant-numeric:tabular-nums; }
  .ring-time .l { margin-top:2px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); }
  .ring-time .live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--mint); margin-right:6px; vertical-align:middle; animation:pulse 2.4s ease-out infinite; }
  .conn-strip { display:flex; align-items:center; gap:9px; padding:13px 16px; }
  .conn-strip .sp { margin-left:auto; font-size:12.5px; color:var(--ink-3); font-weight:600; }
  .control-row > .btn { min-height:54px; font-size:15px; border-radius:var(--r-lg); }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="glyphs">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="1" fill="#eef1f6"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#eef1f6"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#eef1f6"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#eef1f6"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7.1 2.8l-1.5 1.6A7.9 7.9 0 0 0 8.5 4.3 7.9 7.9 0 0 0 2.9 6.6L1.4 5C3.3 3.2 5.8 2.2 8.5 2.2Z" fill="#eef1f6"/><path d="M8.5 6.1c1.6 0 3.1.6 4.2 1.7l-1.6 1.6A3.7 3.7 0 0 0 8.5 8.3c-1 0-2 .4-2.7 1.1L4.3 7.8A6 6 0 0 1 8.5 6.1Z" fill="#eef1f6"/><circle cx="8.5" cy="11" r="1.3" fill="#eef1f6"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#eef1f6" stroke-opacity="0.4"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#eef1f6"/><rect x="24" y="4" width="1.6" height="5" rx="0.8" fill="#eef1f6" fill-opacity="0.45"/></svg>
        </span>
      </div>

      <div class="navbar">
        <div class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="nav-title">Training</div>
        <div></div>
      </div>

      <div class="content">
        <div class="ringwrap reveal d1">
          <div class="ring-outer"><div class="ring-inner">
            <div class="ring-zone">Zone 3 · Tempo</div>
            <div class="ring-hr">152</div>
            <div class="ring-un">bpm</div>
          </div></div>
          <div class="ring-time">
            <div class="t">24:18</div>
            <div class="l"><span class="live-dot"></span>Elapsed · Ride in progress</div>
          </div>
        </div>

        <div class="section-label reveal d2"><h2>Live metrics</h2></div>
        <div class="metric-grid reveal d3">
          <div class="metric accent"><div class="k">Power</div><div class="v">248<span class="u">W</span></div></div>
          <div class="metric"><div class="k">Speed</div><div class="v">31.4<span class="u">km/h</span></div></div>
          <div class="metric"><div class="k">Distance</div><div class="v">12.6<span class="u">km</span></div></div>
          <div class="metric"><div class="k">Calories</div><div class="v">318<span class="u">kcal</span></div></div>
        </div>

        <div class="card conn-strip reveal d4" style="margin-top:14px">
          <span class="pill good"><span class="dot"></span>Wahoo KICKR Bike</span>
          <span class="pill good"><span class="dot"></span>Polar H10</span>
          <span class="sp">Streaming</span>
        </div>
      </div>

      <div class="action-bar reveal d5">
        <div class="btn-row control-row">
          <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>Pause</button>
          <button class="btn btn-danger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>Finish</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
  <div class="caption"><b>04 · Training — C · Effort Ring</b> · dark</div>
</body>
</html>
