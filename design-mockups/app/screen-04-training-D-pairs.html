<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike · Training — D · Featured Pairs</title>
<link rel="stylesheet" href="calm-noir.css" />
<style>
  .minit { display:flex; align-items:center; justify-content:space-between; padding:15px 18px; }
  .minit .l { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-3); }
  .minit .t { margin-top:3px; font-size:34px; font-weight:800; letter-spacing:-.04em; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1; }
  .minit .live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--mint); margin-right:6px; vertical-align:middle; animation:pulse 2.4s ease-out infinite; }
  .minit .dots { display:flex; gap:7px; }

  .pairs { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .feat { border-radius:var(--r-xl); padding:17px; min-height:138px; display:flex; flex-direction:column; justify-content:space-between;
    background:var(--card); border:1px solid var(--hairline); box-shadow:var(--shadow-soft); }
  .feat.hr { background:linear-gradient(160deg, rgba(16,181,164,.16), rgba(16,181,164,.03)); border-color:rgba(16,181,164,.28); }
  .feat .fk { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); display:flex; align-items:center; gap:7px; }
  .feat .fv { font-size:42px; font-weight:800; letter-spacing:-.05em; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1; }
  .feat .fv .u { font-size:14px; color:var(--ink-2); font-weight:700; margin-left:3px; letter-spacing:0; }
  .feat.hr .fv { color:var(--mint-soft); }
  .feat .ftag { font-size:11px; font-weight:700; color:var(--mint-soft); letter-spacing:.04em; }
  .bars { display:flex; gap:3px; align-items:flex-end; height:30px; }
  .bars span { flex:1; background:var(--indigo-soft); opacity:.5; border-radius:2px; }
  .bars span.hot { opacity:.95; }

  .secrow { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .secrow .metric { padding:12px 6px; text-align:center; border-radius:var(--r-md); }
  .secrow .metric .k { display:block; text-align:center; }
  .secrow .metric .v { font-size:18px; margin-top:5px; }
  .secrow .metric .v .u { font-size:10px; display:block; margin-top:1px; }

  .minit .livedot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--mint); margin-right:7px; vertical-align:middle; }
  .footbar { padding:0 16px; }
  .fr { display:flex; align-items:center; gap:12px; padding:13px 0; }
  .fre { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-3); }
  .frn { margin-top:3px; font-size:15px; font-weight:700; letter-spacing:-.01em; color:var(--ink); }
  .frdiv { height:1px; background:var(--hairline); }
  .control-row > .btn { min-height:54px; font-size:15px; border-radius:var(--r-lg); }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="glyphs">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="1" fill="#eef1f6"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#eef1f6"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#eef1f6"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#eef1f6"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7.1 2.8l-1.5 1.6A7.9 7.9 0 0 0 8.5 4.3 7.9 7.9 0 0 0 2.9 6.6L1.4 5C3.3 3.2 5.8 2.2 8.5 2.2Z" fill="#eef1f6"/><path d="M8.5 6.1c1.6 0 3.1.6 4.2 1.7l-1.6 1.6A3.7 3.7 0 0 0 8.5 8.3c-1 0-2 .4-2.7 1.1L4.3 7.8A6 6 0 0 1 8.5 6.1Z" fill="#eef1f6"/><circle cx="8.5" cy="11" r="1.3" fill="#eef1f6"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#eef1f6" stroke-opacity="0.4"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#eef1f6"/><rect x="24" y="4" width="1.6" height="5" rx="0.8" fill="#eef1f6" fill-opacity="0.45"/></svg>
        </span>
      </div>

      <div class="navbar">
        <div class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="nav-title">Training</div>
        <div></div>
      </div>

      <div class="content">
        <div class="card minit reveal d1">
          <div><div class="l"><span class="livedot"></span>Elapsed · Active</div><div class="t">24:18</div></div>
        </div>

        <div class="pairs reveal d2" style="margin-top:14px">
          <div class="feat">
            <div class="fk"><svg width="13" height="13" viewBox="0 0 24 24" fill="#6b7384"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>Power</div>
            <div class="fv">248<span class="u">W</span></div>
            <div class="bars"><span style="height:40%"></span><span style="height:62%"></span><span style="height:48%"></span><span style="height:78%"></span><span style="height:60%"></span><span style="height:88%"></span><span style="height:70%"></span><span class="hot" style="height:100%"></span></div>
          </div>
          <div class="feat hr">
            <div class="fk"><svg width="13" height="13" viewBox="0 0 24 24" fill="#4fd8c8"><path d="M12 21s-7.5-4.9-10-9.2C.3 8.6 1.9 5 5.3 5c2 0 3.3 1.1 4.2 2.4C10.4 6.1 11.7 5 13.7 5 17.1 5 18.7 8.6 17 11.8 14.5 16.1 12 21 12 21z"/></svg>Heart Rate</div>
            <div class="fv">152<span class="u">bpm</span></div>
            <div class="ftag">Polar H10</div>
          </div>
        </div>

        <div class="secrow reveal d3" style="margin-top:11px">
          <div class="metric"><div class="k">Speed</div><div class="v">31.4<span class="u">km/h</span></div></div>
          <div class="metric"><div class="k">Dist</div><div class="v">12.6<span class="u">km</span></div></div>
          <div class="metric"><div class="k">Cadence</div><div class="v">92<span class="u">rpm</span></div></div>
          <div class="metric"><div class="k">Cal</div><div class="v">318<span class="u">kcal</span></div></div>
        </div>

        <div class="card footbar reveal d4" style="margin-top:14px">
          <div class="fr">
            <div style="flex:1; min-width:0"><div class="fre">Smart Bike</div><div class="frn">Wahoo KICKR Bike</div></div>
            <span class="pill good"><span class="dot"></span>Ready</span>
          </div>
          <div class="frdiv"></div>
          <div class="fr">
            <div style="flex:1; min-width:0"><div class="fre">Heart Rate</div><div class="frn">Polar H10</div></div>
            <span class="pill good"><span class="dot"></span>Ready</span>
          </div>
        </div>
      </div>

      <div class="action-bar reveal d5">
        <div class="btn-row control-row">
          <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>Pause</button>
          <button class="btn btn-danger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>Finish</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
  <div class="caption"><b>04 · Training — D · Featured Pairs</b> · dark</div>
</body>
</html>
