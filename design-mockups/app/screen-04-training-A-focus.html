<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike · Training — A · Focus Timer</title>
<link rel="stylesheet" href="calm-noir.css" />
<style>
  .timer-card { position: relative; overflow: hidden; padding: 30px 18px 28px; }
  .timer-card .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--mint); margin-right:7px; vertical-align:middle; animation:pulse 2.4s ease-out infinite; }
  .timer-card::after { content:""; position:absolute; left:50%; top:-30%; width:280px; height:280px; transform:translateX(-50%);
    background:radial-gradient(circle, rgba(46,61,255,.18), rgba(46,61,255,0) 70%); pointer-events:none; animation:glowpulse 2.8s ease-in-out infinite; }
  @keyframes glowpulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .timer-value { font-size: 72px; position:relative; z-index:1; }
  .timer-phase, .timer-cap { position:relative; z-index:1; }

  .strip { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .strip .metric { padding:13px 6px; text-align:center; border-radius:var(--r-md); }
  .strip .metric .v { font-size:19px; margin-top:5px; }
  .strip .metric .v .u { display:block; margin:2px 0 0; font-size:10.5px; }

  .feat-hr { display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(160deg, rgba(16,181,164,.15), rgba(16,181,164,.03)); border:1px solid rgba(16,181,164,.26);
    border-radius:var(--r-xl); padding:16px 18px; box-shadow:var(--shadow-soft); }
  .feat-hr .lab { display:flex; align-items:center; gap:12px; }
  .feat-hr .ic { width:42px; height:42px; border-radius:13px; background:rgba(16,181,164,.14); display:flex; align-items:center; justify-content:center; }
  .feat-hr .eb { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-3); }
  .feat-hr .src { margin-top:3px; font-size:13px; color:var(--ink-2); font-weight:600; }
  .feat-hr .big { font-size:34px; font-weight:800; letter-spacing:-.03em; color:var(--mint-soft); font-variant-numeric:tabular-nums; }
  .feat-hr .big .u { font-size:13px; color:var(--ink-2); font-weight:700; margin-left:2px; }

  .conn-mini { display:flex; align-items:center; gap:9px; padding:13px 16px; }
  .conn-mini .sp { margin-left:auto; font-size:12.5px; color:var(--ink-3); font-weight:600; }
  .control-row > .btn { min-height:56px; font-size:15px; border-radius:var(--r-lg); }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="glyphs">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="1" fill="#eef1f6"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#eef1f6"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#eef1f6"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#eef1f6"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7.1 2.8l-1.5 1.6A7.9 7.9 0 0 0 8.5 4.3 7.9 7.9 0 0 0 2.9 6.6L1.4 5C3.3 3.2 5.8 2.2 8.5 2.2Z" fill="#eef1f6"/><path d="M8.5 6.1c1.6 0 3.1.6 4.2 1.7l-1.6 1.6A3.7 3.7 0 0 0 8.5 8.3c-1 0-2 .4-2.7 1.1L4.3 7.8A6 6 0 0 1 8.5 6.1Z" fill="#eef1f6"/><circle cx="8.5" cy="11" r="1.3" fill="#eef1f6"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#eef1f6" stroke-opacity="0.4"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#eef1f6"/><rect x="24" y="4" width="1.6" height="5" rx="0.8" fill="#eef1f6" fill-opacity="0.45"/></svg>
        </span>
      </div>

      <div class="navbar">
        <div class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="nav-title">Training</div>
        <div></div>
      </div>

      <div class="content">
        <div class="card timer-card reveal d1">
          <div class="timer-phase"><span class="live-dot"></span>RIDE IN PROGRESS</div>
          <div class="timer-value">24:18</div>
          <div class="timer-cap">Elapsed</div>
        </div>

        <div class="section-label tight reveal d2"><h2>This ride</h2></div>
        <div class="strip reveal d2">
          <div class="metric"><div class="k" style="display:block;text-align:center">Speed</div><div class="v">31.4<span class="u">km/h</span></div></div>
          <div class="metric"><div class="k" style="display:block;text-align:center">Power</div><div class="v">248<span class="u">watts</span></div></div>
          <div class="metric"><div class="k" style="display:block;text-align:center">Dist</div><div class="v">12.6<span class="u">km</span></div></div>
          <div class="metric"><div class="k" style="display:block;text-align:center">Cal</div><div class="v">318<span class="u">kcal</span></div></div>
        </div>

        <div class="feat-hr reveal d3" style="margin-top:14px">
          <div class="lab">
            <div class="ic"><svg width="22" height="22" viewBox="0 0 512 512" fill="#4fd8c8"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg></div>
            <div><div class="eb">Heart rate</div><div class="src">Polar H10 · Zone 3 Tempo</div></div>
          </div>
          <div class="big">152<span class="u">bpm</span></div>
        </div>

        <div class="card conn-mini reveal d4" style="margin-top:14px">
          <span class="pill good"><span class="dot"></span>Wahoo KICKR Bike</span>
          <span class="pill good"><span class="dot"></span>Polar H10</span>
          <span class="sp">Both ready</span>
        </div>
      </div>

      <div class="action-bar reveal d5">
        <div class="btn-row control-row">
          <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>Pause</button>
          <button class="btn btn-danger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>Finish</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
  <div class="caption"><b>04 · Training — A · Focus Timer</b> · dark</div>
</body>
</html>
