<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike · Training — B · Cockpit Grid</title>
<link rel="stylesheet" href="calm-noir.css" />
<style>
  .timer-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; }
  .timer-bar .l { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-3); }
  .timer-bar .t { margin-top:3px; font-size:38px; font-weight:800; letter-spacing:-.04em; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1; }
  .timer-bar .r { text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .timer-bar .avg { font-size:12px; color:var(--ink-3); font-weight:600; font-variant-numeric:tabular-nums; }
  .metric .k { display:flex; align-items:center; gap:6px; }
  .metric .k svg { display:block; }
  .metric.accent .k svg path { fill:var(--mint-soft); }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .control-row > .btn { min-height:54px; font-size:15px; border-radius:var(--r-lg); }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="glyphs">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="1" fill="#eef1f6"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#eef1f6"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#eef1f6"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#eef1f6"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7.1 2.8l-1.5 1.6A7.9 7.9 0 0 0 8.5 4.3 7.9 7.9 0 0 0 2.9 6.6L1.4 5C3.3 3.2 5.8 2.2 8.5 2.2Z" fill="#eef1f6"/><path d="M8.5 6.1c1.6 0 3.1.6 4.2 1.7l-1.6 1.6A3.7 3.7 0 0 0 8.5 8.3c-1 0-2 .4-2.7 1.1L4.3 7.8A6 6 0 0 1 8.5 6.1Z" fill="#eef1f6"/><circle cx="8.5" cy="11" r="1.3" fill="#eef1f6"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#eef1f6" stroke-opacity="0.4"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#eef1f6"/><rect x="24" y="4" width="1.6" height="5" rx="0.8" fill="#eef1f6" fill-opacity="0.45"/></svg>
        </span>
      </div>

      <div class="navbar">
        <div class="nav-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="nav-title">Training</div>
        <div></div>
      </div>

      <div class="content">
        <div class="card timer-bar reveal d1">
          <div><div class="l">Elapsed</div><div class="t">24:18</div></div>
          <div class="r"><span class="pill good"><span class="dot"></span>Active</span><span class="avg">Avg 236 W · 92 rpm</span></div>
        </div>

        <div class="section-label tight reveal d2"><h2>Live metrics</h2></div>
        <div class="metric-grid reveal d3">
          <div class="metric"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7384" stroke-width="2"><path d="M12 13a5 5 0 1 1 5-5"/><path d="M12 13l4-4"/></svg>Speed</div><div class="v">31.4<span class="u">km/h</span></div></div>
          <div class="metric accent"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="#4fd8c8"><path d="M12 21s-7.5-4.9-10-9.2C.3 8.6 1.9 5 5.3 5c2 0 3.3 1.1 4.2 2.4C10.4 6.1 11.7 5 13.7 5 17.1 5 18.7 8.6 17 11.8 14.5 16.1 12 21 12 21z"/></svg>Heart Rate</div><div class="v">152<span class="u">bpm</span></div></div>
          <div class="metric"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="#6b7384"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>Power</div><div class="v">248<span class="u">W</span></div></div>
          <div class="metric"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7384" stroke-width="2"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2" fill="#6b7384"/></svg>Distance</div><div class="v">12.6<span class="u">km</span></div></div>
          <div class="metric"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="#6b7384"><path d="M12 2c1 4-2 5-2 8a2 2 0 1 0 4 0c2 2 3 3 3 6a5 5 0 0 1-10 0c0-5 5-7 5-14z"/></svg>Calories</div><div class="v">318<span class="u">kcal</span></div></div>
          <div class="metric"><div class="k"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7384" stroke-width="2"><path d="M20 12a8 8 0 1 1-3-6.2"/><path d="M20 4v4h-4"/></svg>Cadence</div><div class="v">92<span class="u">rpm</span></div></div>
        </div>

        <div class="section-label reveal d4"><h2>Connections</h2></div>
        <div class="row-list reveal d5">
          <div class="dev-card">
            <div class="dev-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M5.5 17.5l4-9h5l3 9M9 8.5h3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="dev-meta"><div class="dev-name">Wahoo KICKR Bike</div><div class="dev-kind">Smart Bike</div></div>
            <span class="pill good"><span class="dot"></span>Ready</span>
          </div>
          <div class="dev-card">
            <div class="dev-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="#5663ff"><path d="M12 21s-7.5-4.9-10-9.2C.3 8.6 1.9 5 5.3 5c2 0 3.3 1.1 4.2 2.4C10.4 6.1 11.7 5 13.7 5 17.1 5 18.7 8.6 17 11.8 14.5 16.1 12 21 12 21z"/></svg></div>
            <div class="dev-meta"><div class="dev-name">Polar H10</div><div class="dev-kind">Heart Rate · Chest strap</div></div>
            <span class="pill good"><span class="dot"></span>Ready</span>
          </div>
        </div>
      </div>

      <div class="action-bar reveal d6">
        <div class="btn-row control-row">
          <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>Pause</button>
          <button class="btn btn-danger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>Finish</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
  <div class="caption"><b>04 · Training — B · Cockpit Grid</b> · dark</div>
</body>
</html>
