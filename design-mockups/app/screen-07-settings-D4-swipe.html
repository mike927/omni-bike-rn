<!DOCTYPE html>

<head>

<title>Omni Bike · Settings — Swipe Actions</title>
<link rel="stylesheet" href="calm-noir.css" />
<style>
  /* ---- Concept D4: gesture-native swipe actions (no button wall) ---- */
  /* A gear row reveals Replace / Forget on swipe-left, exactly like Mail.
     The everyday action (Connect) lives as a trailing chip while at rest. */

  .swipe-row { position: relative; border-radius: var(--r-lg); }
  .swipe-row .swipe-actions {
    position: absolute; top: 0; right: 0; bottom: 0; width: 148px;
    display: flex; flex-direction: row-reverse; gap: 8px;
  }
  .swipe-act {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    border-radius: var(--r-lg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: .01em; color: #fff;
  }
  .swipe-act.replace { background: linear-gradient(180deg, #3a47ff, #2e3dff); }
  .swipe-act.forget  { background: linear-gradient(180deg, #ff5d6c, #ef4b5c); }
  .swipe-act svg { display: block; }
  /* foreground card sits above the actions; baseline shows a ~10px peek, and a
     gentle periodic nudge opens to reveal Replace / Forget, then springs back */
  .swipe-row .dev-card {
    position: relative; z-index: 1; margin: 0;
    box-shadow: var(--shadow-soft), 7px 0 18px -10px rgba(0,0,0,.55);
    animation: swipe-hint 5s cubic-bezier(.45,.05,.2,1) infinite;
  }
  @keyframes swipe-hint {
    0%, 46%   { transform: translateX(-10px); }
    60%       { transform: translateX(-124px); }
    73%       { transform: translateX(-108px); }
    88%, 100% { transform: translateX(-10px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .swipe-row .dev-card { animation: none; transform: translateX(-10px); }
  }

  /* trailing "Connect" chip = the primary action while a row is at rest */
  .chip-btn {
    flex: 0 0 auto; font-family: inherit; border: none; cursor: pointer;
    font-size: 13.5px; font-weight: 700; padding: 9px 16px; border-radius: var(--r-pill);
    background: var(--indigo); color: #fff; box-shadow: 0 10px 20px -12px rgba(46,61,255,.9);
  }
  .chip-btn:active { background: var(--indigo-press); transform: scale(.97); }

  /* "Primary" marker on the selected HR source */
  .tag {
    font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: var(--indigo-soft); background: var(--indigo-tint);
    border-radius: 6px; padding: 2px 7px; vertical-align: middle; margin-left: 7px;
  }

  /* no text hint — the swipe affordance is shown via the row's peek + nudge */

  .dev-card .chev { flex: 0 0 18px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
