<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike Watch · 01 Vital Ring</title>
<link rel="stylesheet" href="watch-noir.css" />
<style>
  .ring-wrap { position: relative; flex: 1 1 auto; display: flex; align-items: center; justify-content: center; margin: 2px 0 12px; }
  .ring-svg { width: 226px; height: 226px; transform: rotate(-90deg); }
  .ring-svg .track { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 14; }
  .ring-svg .prog { fill: none; stroke: url(#mintgrad); stroke-width: 14; stroke-linecap: round; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .hr-num { font-size: 76px; }
</style>
</head>
<body class="solo">
  <div class="watch">
    <div class="w-screen">
      <div class="w-top">
        <span class="rec"><span class="d"></span>Indoor Ride</span>
        <span class="w-time">9:41</span>
      </div>
      <div class="w-body">
        <span class="pill good reveal d1"><span class="dot"></span>Ready</span>

        <div class="ring-wrap reveal d2">
          <svg class="ring-svg" viewBox="0 0 226 226">
            <defs>
              <linearGradient id="mintgrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#10b5a4" />
                <stop offset="1" stop-color="#4fd8c8" />
              </linearGradient>
            </defs>
            <circle class="track" cx="113" cy="113" r="99" />
            <!-- 99r → circumference ≈ 622; 70% fill = dasharray 435 622 -->
            <circle class="prog" cx="113" cy="113" r="99" stroke-dasharray="435 622" />
          </svg>
          <div class="ring-center">
            <span class="hr-label"><svg width="15" height="15" viewBox="0 0 512 512" fill="currentColor"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg>Heart Rate</span>
            <span class="hr-num">152</span>
            <span class="hr-unit">bpm</span>
          </div>
        </div>

        <div class="time-inline reveal d3" style="align-self:center; margin-bottom:14px">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          24:18
        </div>

        <div class="ctrl-row reveal d4">
          <button class="w-btn pause"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></svg>Pause</button>
          <button class="w-btn end"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>End</button>
        </div>
      </div>
    </div>
  </div>
  <div class="caption"><b>01 · Vital Ring</b> — HR ring hero · active ride</div>
</body>
</html>
