<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike Watch · 03 Dual Pair</title>
<link rel="stylesheet" href="watch-noir.css" />
<style>
  .pair-stack { flex: 1 1 auto; display: flex; flex-direction: column; gap: 10px; justify-content: center; margin: 6px 0 12px; }
  .pair-stack .w-card .cv { font-size: 42px; }
</style>
</head>
<body class="solo">
  <div class="watch">
    <div class="w-screen">
      <div class="w-top">
        <span class="rec"><span class="d"></span>Indoor Ride</span>
        <span class="w-time">9:41</span>
      </div>
      <div class="w-body">
        <span class="pill good reveal d1"><span class="dot"></span>Ready</span>

        <div class="pair-stack">
          <div class="w-card hr reveal d2">
            <div class="ck"><svg width="13" height="13" viewBox="0 0 512 512" fill="currentColor"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg>Heart Rate</div>
            <div class="cv">152<span class="u">bpm</span></div>
            <div class="ctag">Polar H10</div>
          </div>
          <div class="w-card reveal d3">
            <div class="ck"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Elapsed</div>
            <div class="cv">24:18</div>
          </div>
        </div>

        <div class="ctrl-row reveal d4">
          <button class="w-btn pause"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></svg>Pause</button>
          <button class="w-btn end"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>End</button>
        </div>
      </div>
    </div>
  </div>
  <div class="caption"><b>03 · Dual Pair</b> — HR + Elapsed cards (app pairs language) · active ride</div>
</body>
</html>
