<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike Watch · 05 Workout Toolbar</title>
<link rel="stylesheet" href="watch-noir.css" />
<style>
  .tb-hero { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .tb-hero .hr-num { font-size: 84px; }
  .tb-sub { display: inline-flex; align-items: center; gap: 7px; margin-top: 4px; font-size: 17px; font-weight: 700; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .tb-sub svg { color: var(--ink-3); }
  .ctrl-toolbar { margin-bottom: 8px; }
</style>
</head>
<body class="solo">
  <div class="watch">
    <div class="w-screen">
      <div class="w-top">
        <span class="rec"><span class="d"></span>Indoor Ride</span>
        <span class="w-time">9:41</span>
      </div>
      <div class="w-body">
        <span class="pill good reveal d1"><span class="dot"></span>Ready</span>

        <div class="tb-hero reveal d2">
          <span class="hr-label"><svg width="15" height="15" viewBox="0 0 512 512" fill="currentColor"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg>Heart Rate</span>
          <span class="hr-num">152</span>
          <span class="tb-sub">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            24:18 elapsed
          </span>
        </div>

        <div class="ctrl-toolbar reveal d4">
          <div class="round-ctrl end">
            <div class="circ"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg></div>
            <span class="rl">End</span>
          </div>
          <div class="round-ctrl pause">
            <div class="circ"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.6"/><rect x="14" y="5" width="4" height="14" rx="1.6"/></svg></div>
            <span class="rl">Pause</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="caption"><b>05 · Workout Toolbar</b> — HR hero + round icon controls · active ride</div>
</body>
</html>
