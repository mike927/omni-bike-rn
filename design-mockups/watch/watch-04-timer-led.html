<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike Watch · 04 Timer-Led</title>
<link rel="stylesheet" href="watch-noir.css" />
<style>
  .tl-hero { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .tl-hero .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--amber-soft); }
  .tl-hero .time-num { font-size: 64px; }
  .tl-hr { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 22px; font-weight: 800; color: var(--mint-soft); font-variant-numeric: tabular-nums; }
  .tl-hr svg { color: var(--mint); }
  .tl-hr .u { font-size: 13px; font-weight: 700; color: var(--ink-2); }
</style>
</head>
<body class="solo">
  <div class="watch">
    <div class="w-screen">
      <div class="w-top">
        <span class="rec" style="color:var(--amber-soft)"><span class="d" style="background:var(--amber);animation:pulse-amber 1.4s ease-out infinite"></span>Paused</span>
        <span class="w-time" style="color:var(--amber-soft)">9:41</span>
      </div>
      <div class="w-body">
        <span class="pill inactive reveal d1"><span class="dot"></span>Paused</span>

        <div class="tl-hero reveal d2">
          <span class="eyebrow">Elapsed</span>
          <span class="time-num">24:18</span>
          <span class="tl-hr">
            <svg width="18" height="18" viewBox="0 0 512 512" fill="currentColor"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg>
            152<span class="u">bpm</span>
          </span>
        </div>

        <div class="ctrl-row reveal d4">
          <button class="w-btn resume"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>Resume</button>
          <button class="w-btn end"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>End</button>
        </div>
      </div>
    </div>
  </div>
  <div class="caption"><b>04 · Timer-Led</b> — Elapsed hero, HR sub-metric · paused state shown</div>
</body>
</html>
