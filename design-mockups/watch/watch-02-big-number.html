<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni Bike Watch · 02 Big Number</title>
<link rel="stylesheet" href="watch-noir.css" />
<style>
  .bn-hero { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .bn-hero .hr-num { font-size: 96px; }
  .bn-time { display: flex; align-items: center; justify-content: center; gap: 9px; padding: 10px 0 14px; border-top: 1px solid var(--hairline); margin-top: 6px; }
  .bn-time .time-label { color: var(--ink-3); }
  .bn-time .v { font-size: 26px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
</style>
</head>
<body class="solo">
  <div class="watch">
    <div class="w-screen">
      <div class="w-top">
        <span class="rec"><span class="d"></span>Indoor Ride</span>
        <span class="w-time">9:41</span>
      </div>
      <div class="w-body">
        <span class="pill good reveal d1"><span class="dot"></span>Ready</span>

        <div class="bn-hero reveal d2">
          <span class="hr-label"><svg width="16" height="16" viewBox="0 0 512 512" fill="currentColor"><path d="M256 448a32 32 0 01-18-5.57c-78.59-53.35-112.62-89.93-131.39-112.8-40-48.75-59.15-98.8-58.61-153C48.63 114.52 98.46 64 159.08 64c44.08 0 74.61 24.83 92.39 45.51a6 6 0 009.06 0C278.31 88.81 308.84 64 352.92 64c60.62 0 110.45 50.52 111.08 112.64.54 54.21-18.63 104.26-58.61 153-18.77 22.87-52.8 59.45-131.39 112.8a32 32 0 01-18 5.56z"/></svg>Heart Rate</span>
          <span class="hr-num">152</span>
          <span class="hr-unit">bpm</span>
        </div>

        <div class="bn-time reveal d3">
          <span class="time-label">Elapsed</span>
          <span class="v">24:18</span>
        </div>

        <div class="ctrl-row reveal d4">
          <button class="w-btn pause"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></svg>Pause</button>
          <button class="w-btn end"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>End</button>
        </div>
      </div>
    </div>
  </div>
  <div class="caption"><b>02 · Big Number</b> — HR numeral hero · active ride</div>
</body>
</html>
