name: PR Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  issue_comment:
    types: [created, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: CI Gate (Lint, Type, Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Smoke build
        run: npm run build:smoke

  pr_agent_review:
    name: AI Review (Gemini 3.1 Pro)
    runs-on: ubuntu-latest
    if: ${{ github.event.sender.type != 'Bot' }}
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Default Gemini Models
          config.model: "gemini/gemini-1.5-pro"
          config.fallback_models: '["gemini/gemini-1.5-flash"]'
          # Google AI Studio API Key
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Automation & Behavior
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: "['opened', 'reopened', 'ready_for_review', 'synchronize']"
          # Context-specific instructions for Gemini 3.1 reasoning
          pr_reviewer.extra_instructions: "Strictly enforce TypeScript best practices, the 1Hz Metronome Engine architecture, and Expo SDK 54 New Architecture (JSI) synchronous patterns."