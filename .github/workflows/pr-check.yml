name: PR Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  issue_comment:
    types: [created, edited]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: CI Gate (Lint, Type, Test, Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci --runInBand

      - name: Smoke build
        run: npm run build:smoke

  pr_agent_review:
    name: AI Review (Qodo / Gemini)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.sender.type != 'Bot' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.sender.type != 'Bot')

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: PR Agent action step
        uses: qodo-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Model configuration for Gemini
          config.model: "gemini/gemini-3.1-pro"
          config.fallback_models: '["gemini/gemini-3.1-flash"]'
          config.custom_model_max_tokens: "1000000"
          
          # Configure tools to avoid DynaBox parse crashes on PR Description
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          
          # Configure which PR events trigger the action
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          
          # App-Specific Instructions
          pr_reviewer.extra_instructions: "Enforce strict TypeScript best practices, validate 1Hz Metronome Engine architecture consistency, and ensure Expo SDK 54 New Architecture (JSI) synchronous patterns."