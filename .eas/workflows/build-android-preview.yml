name: Build Android preview

# Auto-build a standalone Android preview APK whenever main advances (i.e. a PR merges).
# Runs on EAS infrastructure (not GitHub Actions). Strava secrets are pulled from the
# `preview` EAS environment (mapped in eas.json). Requires the GitHub repo to be connected
# to the EAS project for `push` triggers to fire.
on:
  push:
    branches:
      - main

jobs:
  build_android_preview:
    name: Build Android preview APK
    type: build
    params:
      platform: android
      profile: preview
